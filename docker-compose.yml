version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: woojulib-postgres
    restart: always

    # 환경 변수
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: woojulib
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"

    # 포트 매핑
    ports:
      - "30306:5432"  # 호스트:컨테이너

    # 볼륨 (데이터 지속성)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql

    # 헬스체크
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d woojulib"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - woojulib-network

  # 선택: pgAdmin (PostgreSQL 관리 도구)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: woojulib-pgadmin
    restart: always

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@woojulib.local
      PGADMIN_DEFAULT_PASSWORD: root

    ports:
      - "5050:80"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - woojulib-network

  # 선택: Redis (캐싱용)
  redis:
    image: redis:7-alpine
    container_name: woojulib-redis
    restart: always

    ports:
      - "6379:6379"

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - woojulib-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  woojulib-network:
    driver: bridge
